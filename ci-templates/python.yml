# Template: Python CI with uv
# Copy to .github/workflows/ci.yml in target repo
# Adapt: working-directory, lint command (ruff/pylint), test command
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
